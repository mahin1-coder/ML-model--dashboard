apiVersion: v1
kind: Namespace
metadata:
  name: ml-dashboard
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-dashboard-config
  namespace: ml-dashboard
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: "https://your-domain.com"
  MAX_UPLOAD_SIZE_MB: "100"
---
apiVersion: v1
kind: Secret
metadata:
  name: ml-dashboard-secrets
  namespace: ml-dashboard
type: Opaque
stringData:
  JWT_SECRET: "your-production-secret-key"
  DATABASE_URL: "postgresql+asyncpg://user:password@postgres:5432/ml_dashboard"
  REDIS_URL: "redis://redis:6379/0"
  STRIPE_API_KEY: "sk_live_your_api_key"
  STRIPE_WEBHOOK_SECRET: "whsec_your_webhook_secret"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ml-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: your-registry/ml-dashboard-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ml-dashboard-config
            - secretRef:
                name: ml-dashboard-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: models
              mountPath: /app/models
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
        - name: models
          persistentVolumeClaim:
            claimName: models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ml-dashboard
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ml-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/ml-dashboard-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ml-dashboard
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ml-dashboard-ingress
  namespace: ml-dashboard
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  tls:
    - hosts:
        - your-domain.com
      secretName: ml-dashboard-tls
  rules:
    - host: your-domain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: ml-dashboard
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-pvc
  namespace: ml-dashboard
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
