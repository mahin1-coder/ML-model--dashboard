# Docker Compose for development
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ml-dev-postgres
    environment:
      POSTGRES_USER: ml_user
      POSTGRES_PASSWORD: ml_password
      POSTGRES_DB: ml_dashboard
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ml_user -d ml_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml-dev-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ml-dev-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml-dev-network

volumes:
  postgres_dev_data:

networks:
  ml-dev-network:
    driver: bridge
